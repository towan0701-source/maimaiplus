<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>mini maimai Touch - JSON Chart Loader</title>
  <style>
    * { box-sizing: border-box; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent; touch-action: none; }
    html, body { width: 100vw; height: 100vh; margin: 0; padding: 0; overflow: hidden; background-color: #0b0b0e; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    #select-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle at center, #1b1b26 0%, #050508 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.3s ease; }
    .select-title { font-size: clamp(20px, 4vw, 32px); font-weight: bold; color: #00d2ff; text-shadow: 0 0 10px rgba(0,210,255,0.5); margin-bottom: 20px; letter-spacing: 2px; }
    .song-card { width: min(90vw, 380px); background: rgba(255, 255, 255, 0.05); border: 2px solid #00d2ff; border-radius: 16px; padding: 20px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 0 20px rgba(0, 210, 255, 0.2); }
    .song-cover { width: 80px; height: 80px; border-radius: 12px; background: linear-gradient(135deg, #ff007f, #7928ca); display: flex; align-items: center; justify-content: center; font-size: 32px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5); margin-bottom: 8px; }
    .song-name { font-size: 18px; font-weight: bold; margin-bottom: 2px; text-align: center; }
    .song-artist { font-size: 12px; color: #aaa; margin-bottom: 12px; }
    .loaded-diff { font-size: 14px; font-weight: bold; color: #22c55e; margin-bottom: 12px; text-align: center; display: none; }
    .speed-selector { display: flex; align-items: center; justify-content: space-between; width: 100%; background: rgba(0, 0, 0, 0.3); padding: 8px 14px; border-radius: 8px; margin-bottom: 12px; border: 1px solid rgba(255, 255, 255, 0.1); }
    .speed-label { font-size: 13px; font-weight: bold; color: #00d2ff; }
    .speed-ctrl { display: flex; align-items: center; gap: 12px; }
    .speed-btn { width: 28px; height: 28px; border-radius: 50%; background: rgba(255, 255, 255, 0.15); border: 1px solid #00d2ff; color: #fff; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .speed-val { font-size: 15px; font-weight: bold; width: 36px; text-align: center; }
    .file-input-wrapper { width: 100%; margin-bottom: 15px; }
    .file-label { display: block; width: 100%; padding: 8px; font-size: 12px; font-weight: bold; text-align: center; background: rgba(255, 255, 255, 0.1); border: 1px dashed #00d2ff; border-radius: 8px; color: #00d2ff; cursor: pointer; }
    .file-label:hover { background: rgba(0, 210, 255, 0.15); }
    .play-btn { width: 100%; padding: 12px; font-size: 18px; font-weight: bold; background: linear-gradient(90deg, #00d2ff, #0055ff); border: none; border-radius: 25px; color: #fff; cursor: pointer; box-shadow: 0 0 15px rgba(0, 210, 255, 0.4); }
    .play-btn:disabled { background: #555; box-shadow: none; cursor: not-allowed; }
    #result-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(5, 5, 8, 0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 150; opacity: 0; transition: opacity 0.4s ease; }
    .result-title { font-size: 32px; font-weight: 900; color: #ffea00; margin-bottom: 20px; }
    .result-rank { font-size: 80px; font-weight: 900; color: #00d2ff; margin-bottom: 10px; }
    .result-detail { font-size: 20px; color: #ccc; margin-bottom: 30px; text-align: center; }
    #game-container { position: relative; width: min(96vw, 96vh, 800px); height: min(96vw, 96vh, 800px); border-radius: 50%; background: radial-gradient(circle, #2a2a35 0%, #111115 70%); box-shadow: 0 0 50px rgba(0, 210, 255, 0.3), inset 0 0 25px rgba(0, 0, 0, 0.9); display: flex; align-items: center; justify-content: center; }
    .outer-ring { position: absolute; width: 83%; height: 83%; border: 8px solid rgba(255, 255, 255, 0.12); border-radius: 50%; pointer-events: none; }
    .center-screen { position: absolute; display: flex; align-items: center; justify-content: center; z-index: 10; pointer-events: none; }
    .score-val { font-size: clamp(20px, 6vw, 52px); font-weight: 900; color: #ffffff; font-family: 'Arial Black', Impact, sans-serif; text-shadow: 0 0 5px #00d2ff, 0 0 12px #00d2ff, 0 0 25px #00d2ff; }
    .score-val.bump { transform: scale(1.2); }
    .countdown-text { position: absolute; font-size: clamp(40px, 15vw, 100px); font-weight: 900; color: #ffeb3b; z-index: 30; }
    .judge-text { position: absolute; font-weight: bold; font-size: clamp(12px, 3vw, 24px); pointer-events: none; animation: popup 0.3s forwards; z-index: 25; text-align: center; white-space: nowrap; }
    @keyframes popup { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(1.2); opacity: 0; } }
    
    .button-node { position: absolute; width: 14%; height: 14%; border-radius: 50%; background: transparent; border: 2px solid rgba(255, 255, 255, 0.15); display: flex; align-items: center; justify-content: center; font-weight: bold; color: rgba(255, 255, 255, 0.3); font-size: clamp(12px, 3vw, 24px); cursor: pointer; z-index: 15; transition: background 0.05s, transform 0.05s, box-shadow 0.05s, border-color 0.05s; }
    .button-node.active { background: #00d2ff; color: #000; border-color: #00d2ff; transform: scale(1.15); box-shadow: 0 0 20px #00d2ff, 0 0 40px #00d2ff, inset 0 0 10px rgba(255, 255, 255, 0.8); }

    .note-tap { position: absolute; width: 9%; height: 9%; border-radius: 50%; border: 4px solid #ff007f; background: rgba(255, 0, 127, 0.4); pointer-events: none; z-index: 5; transform: translate(-50%, -50%); }
    .note-each { position: absolute; width: 9%; height: 9%; border-radius: 50%; border: 4px solid #ffea00; background: rgba(255, 234, 0, 0.5); pointer-events: none; z-index: 5; transform: translate(-50%, -50%); }
    .note-break { position: absolute; width: 10%; height: 10%; border-radius: 50%; border: 4px solid #ff3d00; background: radial-gradient(circle, #ffeb3b, #ff3d00); pointer-events: none; z-index: 6; transform: translate(-50%, -50%); }
    .note-hold-container { position: absolute; pointer-events: none; z-index: 4; transform-origin: left center; }
    .hold-bar { position: absolute; height: clamp(14px, 3.5vw, 26px); top: clamp(-7px, -1.75vw, -13px); background: linear-gradient(90deg, rgba(255, 0, 204, 0.9), rgba(255, 0, 128, 0.7)); border: 2px solid #ff00cc; border-radius: 10px; }
    .hold-head { position: absolute; width: clamp(20px, 5vw, 36px); height: clamp(20px, 5vw, 36px); top: clamp(-10px, -2.5vw, -18px); border-radius: 50%; background: #ff00cc; border: 3px solid #fff; }
    .hold-tail { position: absolute; width: clamp(16px, 4vw, 28px); height: clamp(16px, 4vw, 28px); top: clamp(-8px, -2vw, -14px); border-radius: 50%; background: #880066; border: 2px solid #ff00cc; }
    .note-star { position: absolute; width: 10%; height: 10%; background: #00e5ff; clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); pointer-events: none; z-index: 6; transform: translate(-50%, -50%); }
    .slide-path-container { position: absolute; height: clamp(8px, 2vw, 16px); pointer-events: none; z-index: 3; transform-origin: left center; }
    .slide-path-bg { position: absolute; top: 0; left: 0; height: 100%; width: 100%; background: rgba(0, 229, 255, 0.2); border: 1px solid #00e5ff; border-radius: 6px; }
    .slide-path-fill { position: absolute; top: 0; right: 0; height: 100%; width: 100%; background: linear-gradient(90deg, #00e5ff, #ff00cc); border-radius: 6px; }
    .slide-moving-star { position: absolute; width: clamp(24px, 6vw, 44px); height: clamp(24px, 6vw, 44px); background: #ffea00; clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); pointer-events: none; z-index: 7; transform: translate(-50%, -50%); }
    .back-btn { position: absolute; top: 15px; left: 15px; padding: 8px 16px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 12px; color: #ccc; font-size: 12px; cursor: pointer; z-index: 50; }
  </style>
</head>
<body oncontextmenu="return false;">

  <audio id="bgm" src="フリー音源/maou_14_shining_star.mp3" preload="auto"></audio>

  <!-- 曲選択画面 -->
  <div id="select-screen">
    <div class="select-title">SELECT MUSIC</div>
    <div class="song-card">
      <div class="song-cover">🎵</div>
      <div class="song-name">Shining Star</div>
      <div class="song-artist">魔王魂 (BPM読込対応)</div>
      
      <div class="file-input-wrapper">
        <label for="chart-file" class="file-label" id="file-status">📂 譜面データ (.json) を選択</label>
        <input type="file" id="chart-file" accept=".json" style="display: none;" onchange="loadChartFile(event)">
      </div>
      
      <div class="loaded-diff" id="loaded-diff">難易度: 未設定</div>

      <div class="speed-selector">
        <span class="speed-label">SPEED</span>
        <div class="speed-ctrl">
          <div class="speed-btn" onclick="changeSpeed(-0.5)">-</div>
          <span id="speed-val" class="speed-val">5.0</span>
          <div class="speed-btn" onclick="changeSpeed(0.5)">+</div>
        </div>
      </div>

      <button class="play-btn" id="play-btn" onclick="prepareGame()" disabled>譜面未読み込み</button>
    </div>
  </div>

  <!-- リザルト画面 -->
  <div id="result-screen">
    <div class="result-title">TRACK COMPLETE!</div>
    <div id="result-rank" class="result-rank">S</div>
    <div class="result-detail">
      SCORE: <span id="result-score">100.00%</span><br>
      MAX COMBO: <span id="result-combo">0</span>
    </div>
    <button class="play-btn" style="width: 200px;" onclick="backToSelect()">SELECT MUSIC</button>
  </div>

  <button class="back-btn" onclick="backToSelect()">← MUSIC SELECT</button>

  <div id="game-container">
    <div class="outer-ring"></div>
    <div class="center-screen">
      <div id="score" class="score-val">100.00%</div>
      <div id="countdown" class="countdown-text"></div>
    </div>

    <!-- 8方向ボタン -->
    <div class="button-node" id="btn-1">1</div>
    <div class="button-node" id="btn-2">2</div>
    <div class="button-node" id="btn-3">3</div>
    <div class="button-node" id="btn-4">4</div>
    <div class="button-node" id="btn-5">5</div>
    <div class="button-node" id="btn-6">6</div>
    <div class="button-node" id="btn-7">7</div>
    <div class="button-node" id="btn-8">8</div>
  </div>

  <script>
    document.addEventListener('contextmenu', e => e.preventDefault(), { passive: false });
    document.addEventListener('touchstart', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });

    let containerSize = 360, CENTER_X = 180, CENTER_Y = 180, RADIUS = 150;
    const BUTTON_ANGLES = { 1: -112.5, 2: -157.5, 3: 157.5, 4: 112.5, 5: 67.5, 6: 22.5, 7: -22.5, 8: -67.5 };
    const KEY_MAP = { 'q': 1, 'a': 2, 'z': 3, 'x': 4, 'p': 8, 'l': 7, 'm': 6, 'n': 5 };
    
    let isPlaying = false;
    let userSpeed = 5.0;
    let noteTravelTime = 0.8;
    let score = 100.00, combo = 0, maxCombo = 0;
    let penaltyPerNote = 1.0;
    let notes = [], activeSlides = [], activeHolds = {}, chartQueue = [];
    let loadedChartData = null;
    let animFrame = null;
    
    const SONG_LENGTH = 275;
    const bgm = document.getElementById('bgm');

    let activeInputs = {};
    for (let i = 1; i <= 8; i++) activeInputs[i] = new Set();
    let touchToLane = {};

    function loadChartFile(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(evt) {
        try {
          loadedChartData = JSON.parse(evt.target.result);
          document.getElementById('file-status').innerText = `✅ ${file.name} 読み込み完了`;
          document.getElementById('file-status').style.color = '#22c55e';
          
          if(loadedChartData.difficulty) {
            const diffEl = document.getElementById('loaded-diff');
            diffEl.style.display = 'block';
            let bpmInfo = loadedChartData.bpm ? ` (BPM: ${loadedChartData.bpm})` : '';
            diffEl.innerText = `難易度: ${loadedChartData.difficulty}${bpmInfo}`;
          }
          
          const playBtn = document.getElementById('play-btn');
          playBtn.disabled = false;
          playBtn.innerText = 'PLAY';
        } catch (err) {
          alert('譜面ファイルの形式が不正です。');
        }
      };
      reader.readAsText(file);
    }

    function changeSpeed(delta) {
      userSpeed = Math.max(1.0, Math.min(10.0, userSpeed + delta));
      document.getElementById('speed-val').innerText = userSpeed.toFixed(1);
    }

    function updateLayout() {
      const container = document.getElementById('game-container');
      containerSize = container.clientWidth;
      CENTER_X = containerSize / 2; CENTER_Y = containerSize / 2; RADIUS = containerSize * 0.415;
      const btnRadius = containerSize * 0.07;
      for (let i = 1; i <= 8; i++) {
        const btn = document.getElementById(`btn-${i}`);
        const angleRad = BUTTON_ANGLES[i] * (Math.PI / 180);
        btn.style.left = `${CENTER_X + RADIUS * Math.cos(angleRad) - btnRadius}px`;
        btn.style.top = `${CENTER_Y + RADIUS * Math.sin(angleRad) - btnRadius}px`;
      }
    }
    window.addEventListener('resize', updateLayout);

    function getButtonLaneAtCoords(x, y) {
      const rx = x - CENTER_X;
      const ry = y - CENTER_Y;
      const angleRad = Math.atan2(ry, rx);
      let angleDeg = angleRad * (180 / Math.PI);
      if (angleDeg > 180) angleDeg -= 360;

      const dist = Math.hypot(rx, ry);
      if (dist >= containerSize * 0.3 && dist <= containerSize * 0.5) {
        for (let lane = 1; lane <= 8; lane++) {
          const baseAngle = BUTTON_ANGLES[lane];
          let diff = Math.abs(angleDeg - baseAngle);
          if (diff > 180) diff = 360 - diff;
          if (diff <= 22.5) {
            return lane;
          }
        }
      }
      return null;
    }

    const gameContainer = document.getElementById('game-container');
    gameContainer.addEventListener('pointermove', (e) => {
      if (!isPlaying) return;
      const rect = gameContainer.getBoundingClientRect();
      checkSlideTrace(e.clientX - rect.left, e.clientY - rect.top);
    });

    function pressButtonInput(lane, inputId) {
      activeInputs[lane].add(inputId);
      updateButtonVisual(lane);
      onButtonDown(lane);
    }

    function releaseButtonInput(lane, inputId) {
      activeInputs[lane].delete(inputId);
      updateButtonVisual(lane);
      onButtonUp(lane);
    }

    function updateButtonVisual(lane) {
      const btn = document.getElementById(`btn-${lane}`);
      if (activeInputs[lane].size > 0) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    }

    function handleTouchStart(e) {
      const rect = gameContainer.getBoundingClientRect();
      for (let touch of e.changedTouches) {
        const tx = touch.clientX - rect.left;
        const ty = touch.clientY - rect.top;
        const lane = getButtonLaneAtCoords(tx, ty);
        touchToLane[touch.identifier] = lane;
        if (lane !== null) {
          pressButtonInput(lane, 'touch_' + touch.identifier);
        }
      }
    }

    function handleTouchMove(e) {
      const rect = gameContainer.getBoundingClientRect();
      for (let touch of e.touches) {
        const tx = touch.clientX - rect.left;
        const ty = touch.clientY - rect.top;
        const newLane = getButtonLaneAtCoords(tx, ty);
        const oldLane = touchToLane[touch.identifier];

        if (oldLane !== newLane) {
          if (oldLane !== null) {
            releaseButtonInput(oldLane, 'touch_' + touch.identifier);
          }
          if (newLane !== null) {
            pressButtonInput(newLane, 'touch_' + touch.identifier);
          }
          touchToLane[touch.identifier] = newLane;
        }
      }
    }

    function handleTouchEnd(e) {
      for (let touch of e.changedTouches) {
        const oldLane = touchToLane[touch.identifier];
        if (oldLane !== null && oldLane !== undefined) {
          releaseButtonInput(oldLane, 'touch_' + touch.identifier);
        }
        delete touchToLane[touch.identifier];
      }
    }

    window.addEventListener('touchstart', handleTouchStart, { passive: false });
    window.addEventListener('touchmove', handleTouchMove, { passive: false });
    window.addEventListener('touchend', handleTouchEnd, { passive: false });
    window.addEventListener('touchcancel', handleTouchEnd, { passive: false });

    window.addEventListener('keydown', (e) => { 
      if (!e.repeat && KEY_MAP[e.key.toLowerCase()]) {
        const lane = KEY_MAP[e.key.toLowerCase()];
        pressButtonInput(lane, 'key_' + e.key.toLowerCase());
      }
    });
    window.addEventListener('keyup', (e) => { 
      if (KEY_MAP[e.key.toLowerCase()]) {
        const lane = KEY_MAP[e.key.toLowerCase()];
        releaseButtonInput(lane, 'key_' + e.key.toLowerCase());
      }
    });

    updateLayout();

    function prepareGame() {
      if (!loadedChartData) return;
      document.getElementById('select-screen').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('select-screen').style.display = 'none';
        startCountdown();
      }, 300);
    }

    function backToSelect() {
      stopGame();
      bgm.pause(); bgm.currentTime = 0;
      document.getElementById('result-screen').style.opacity = '0';
      setTimeout(() => { document.getElementById('result-screen').style.display = 'none'; }, 300);
      document.getElementById('select-screen').style.display = 'flex';
      setTimeout(() => { document.getElementById('select-screen').style.opacity = '1'; }, 10);
    }

    function startCountdown() {
      const countEl = document.getElementById('countdown');
      const scoreEl = document.getElementById('score');
      scoreEl.style.display = 'none';
      let count = 3; countEl.innerText = count;

      const timer = setInterval(() => {
        count--;
        if (count > 0) countEl.innerText = count;
        else if (count === 0) countEl.innerText = 'GO!';
        else {
          clearInterval(timer);
          countEl.innerText = '';
          scoreEl.style.display = 'block';
          startGame();
        }
      }, 800);
    }

    function startGame() {
      if (isPlaying) return;
      isPlaying = true;
      score = 100.00; combo = 0; maxCombo = 0;
      clearAllNotes(); updateUI();

      noteTravelTime = 1.75 - (userSpeed * 0.15);

      const sourceChart = loadedChartData.notes || loadedChartData || [];
      const bpm = loadedChartData.bpm || 158;
      const secPerBeat = 60 / bpm;
      
      let expandedCount = 0;
      sourceChart.forEach(n => {
        expandedCount++;
        if (n.type === 'EACH' && n.targetLane) expandedCount++;
      });
      penaltyPerNote = expandedCount > 0 ? (100.0 / expandedCount) : 1.0;

      chartQueue = sourceChart.map(n => {
        let time = n.time !== undefined ? n.time : (n.beat * secPerBeat);
        let holdLength = n.holdLength;
        if (n.holdBeat !== undefined) {
            holdLength = n.holdBeat * secPerBeat;
        }
        let slideLength = n.slideLength;
        if (n.slideBeat !== undefined) {
            slideLength = n.slideBeat * secPerBeat;
        }
        return { ...n, time, holdLength: holdLength || 0.35, slideLength: slideLength || null };
      });
      
      chartQueue.sort((a, b) => a.time - b.time);

      bgm.currentTime = 0;
      bgm.play().catch(err => console.warn("音声再生エラー:", err));
      bgm.onended = () => showResult();
      
      const startTime = Date.now();

      function loop() {
        if (!isPlaying) return;
        
        let currentTime = bgm.currentTime;
        if (bgm.paused || bgm.error) {
           currentTime = (Date.now() - startTime) / 1000; 
        }

        if (currentTime >= SONG_LENGTH) {
          showResult();
          return;
        }

        while (chartQueue.length > 0 && chartQueue[0].time - noteTravelTime <= currentTime) {
          const item = chartQueue.shift();
          createNote(item.lane, item.type, item.targetLane, item.holdLength, item.slideLength);
          if (item.type === 'EACH' && item.targetLane) createNote(item.targetLane, 'EACH');
        }

        const delta = 0.016; 
        updateNotes(delta);
        updateActiveSlides(delta);
        animFrame = requestAnimationFrame(loop);
      }
      animFrame = requestAnimationFrame(loop);
    }

    function stopGame() {
      isPlaying = false;
      cancelAnimationFrame(animFrame);
      clearAllNotes();
      touchToLane = {};
      for (let i = 1; i <= 8; i++) {
        activeInputs[i].clear();
        updateButtonVisual(i);
      }
    }

    function showResult() {
      stopGame(); bgm.pause();
      let rank = 'C';
      if (score >= 99.0) rank = 'SS+';
      else if (score >= 95.0) rank = 'SS';
      else if (score >= 90.0) rank = 'S+';
      else if (score >= 80.0) rank = 'S';
      else if (score >= 70.0) rank = 'A';
      else rank = 'B';

      document.getElementById('result-rank').innerText = rank;
      document.getElementById('result-score').innerText = score.toFixed(2) + '%';
      document.getElementById('result-combo').innerText = maxCombo;
      const resultEl = document.getElementById('result-screen');
      resultEl.style.display = 'flex';
      setTimeout(() => { resultEl.style.opacity = '1'; }, 10);
    }

    function clearAllNotes() {
      notes.forEach(n => n.el.remove());
      activeSlides.forEach(s => { s.container.remove(); if (s.starEl) s.starEl.remove(); });
      notes = []; activeSlides = []; activeHolds = {};
    }

    function createNote(lane, type, targetLane = null, holdLength = 0.35, slideLength = null) {
      const angleDeg = BUTTON_ANGLES[lane];
      const angleRad = angleDeg * (Math.PI / 180);
      
      if (type === 'HOLD') {
        const container = document.createElement('div');
        container.className = 'note-hold-container';
        container.style.left = `${CENTER_X}px`; container.style.top = `${CENTER_Y}px`;
        container.style.transform = `rotate(${angleDeg}deg)`;

        const bar = document.createElement('div'); bar.className = 'hold-bar';
        const head = document.createElement('div'); head.className = 'hold-head';
        const tail = document.createElement('div'); tail.className = 'hold-tail';

        container.appendChild(bar); container.appendChild(tail); container.appendChild(head);
        document.getElementById('game-container').appendChild(container);

        notes.push({ lane, type: 'HOLD', headProgress: 0, length: holdLength, speed: noteTravelTime, angle: angleRad, el: container, barEl: bar, headEl: head, tailEl: tail, holding: false });
        return;
      }

      const el = document.createElement('div');
      let className = 'note-tap';
      if (type === 'EACH') className = 'note-each';
      if (type === 'BREAK') className = 'note-break';
      if (type === 'SLIDE') className = 'note-star';
      
      el.className = className;
      document.getElementById('game-container').appendChild(el);
      notes.push({ lane, targetLane, type, progress: 0, speed: noteTravelTime, angle: angleRad, el, slideLength });
    }

    function updateNotes(delta) {
      for (let i = notes.length - 1; i >= 0; i--) {
        const n = notes[i];
        if (n.type === 'HOLD') {
          if (!n.holding) n.headProgress += delta / n.speed;
          else {
            n.length -= delta;
            if (n.length <= 0) {
              combo++; if (combo > maxCombo) maxCombo = combo;
              showJudge('PERFECT HOLD!', '#ff00cc', n.lane); updateUI(true);
              n.el.remove(); notes.splice(i, 1); delete activeHolds[n.lane]; continue;
            }
          }
          const tailProgress = Math.max(0, n.headProgress - (n.length / n.speed));
          
          n.barEl.style.left = `${RADIUS * tailProgress}px`;
          n.barEl.style.width = `${RADIUS * (n.headProgress - tailProgress)}px`;
          n.headEl.style.left = `${RADIUS * n.headProgress - containerSize * 0.02}px`;
          n.tailEl.style.left = `${RADIUS * tailProgress - containerSize * 0.015}px`;

          if (tailProgress > 1.1) {
            score = Math.max(0, score - penaltyPerNote);
            showJudge('MISS', '#ff4d4d', n.lane); combo = 0; updateUI();
            n.el.remove(); notes.splice(i, 1);
          }
          continue;
        }

        n.progress += delta / n.speed;
        const currentRadius = RADIUS * n.progress;
        n.el.style.left = `${CENTER_X + currentRadius * Math.cos(n.angle)}px`;
        n.el.style.top = `${CENTER_Y + currentRadius * Math.sin(n.angle)}px`;

        if (n.progress > 1.2) {
          score = Math.max(0, score - penaltyPerNote);
          showJudge('MISS', '#ff4d4d', n.lane); combo = 0; updateUI();
          n.el.remove(); notes.splice(i, 1);
        }
      }
    }

    function triggerSlide(startLane, endLane, customSlideDuration = null) {
      const a1 = BUTTON_ANGLES[startLane] * (Math.PI / 180), a2 = BUTTON_ANGLES[endLane] * (Math.PI / 180);
      const x1 = CENTER_X + RADIUS * Math.cos(a1), y1 = CENTER_Y + RADIUS * Math.sin(a1);
      const x2 = CENTER_X + RADIUS * Math.cos(a2), y2 = CENTER_Y + RADIUS * Math.sin(a2);

      const length = Math.hypot(x2 - x1, y2 - y1);
      const angle = Math.atan2(y2 - y1, x2 - x1) * (180 / Math.PI);

      const container = document.createElement('div');
      container.className = 'slide-path-container';
      container.style.width = `${length}px`; container.style.left = `${x1}px`; container.style.top = `${y1}px`;
      container.style.transform = `rotate(${angle}deg)`;

      const bg = document.createElement('div'); bg.className = 'slide-path-bg';
      const fill = document.createElement('div'); fill.className = 'slide-path-fill';
      container.appendChild(bg); container.appendChild(fill);
      document.getElementById('game-container').appendChild(container);

      const starEl = document.createElement('div');
      starEl.className = 'slide-moving-star';
      starEl.style.left = `${x1}px`; starEl.style.top = `${y1}px`;
      document.getElementById('game-container').appendChild(starEl);

      const slideDuration = customSlideDuration !== null ? customSlideDuration : Math.max(0.2, 0.55 - (userSpeed * 0.035));

      activeSlides.push({ startLane, endLane, x1, y1, x2, y2, length, container, fill, starEl, waitTime: 0.25, slideDuration, progress: 0, tracedProgress: 0 });
    }

    function updateActiveSlides(delta) {
      for (let i = activeSlides.length - 1; i >= 0; i--) {
        const s = activeSlides[i];
        if (s.waitTime > 0) { s.waitTime -= delta; continue; }

        s.progress += delta / s.slideDuration;
        const currentProg = Math.min(1.0, s.progress);
        s.starEl.style.left = `${s.x1 + (s.x2 - s.x1) * currentProg}px`;
        s.starEl.style.top = `${s.y1 + (s.y2 - s.y1) * currentProg}px`;

        if (s.progress > 1.3) {
          score = Math.max(0, score - penaltyPerNote);
          showJudge('MISS', '#ff4d4d', s.endLane); combo = 0; updateUI();
          s.container.remove(); s.starEl.remove(); activeSlides.splice(i, 1);
        }
      }
    }

    function checkSlideTrace(px, py) {
      activeSlides.forEach((s) => {
        if (s.waitTime > 0) return;
        const dx = px - s.x1, dy = py - s.y1;
        const lineDx = s.x2 - s.x1, lineDy = s.y2 - s.y1;
        const projection = (dx * lineDx + dy * lineDy) / (s.length * s.length);
        const dist = Math.hypot(px - (s.x1 + projection * lineDx), py - (s.y1 + projection * lineDy));

        if (dist < containerSize * 0.08 && projection > s.tracedProgress && projection <= 1.05) {
          
          if (s.tracedProgress < 0.1 && projection > 0.25) {
            return;
          }
          if (projection - s.tracedProgress > 0.4) {
            return;
          }

          s.tracedProgress = Math.min(1.0, projection);
          s.fill.style.width = `${(1 - s.tracedProgress) * 100}%`;

          if (s.tracedProgress >= 0.9) {
            if (s.progress < 0.85) {
              score = Math.max(0, score - penaltyPerNote);
              showJudge('MISS', '#ff4d4d', s.endLane);
              combo = 0;
              updateUI();
              s.container.remove(); s.starEl.remove();
              const idx = activeSlides.indexOf(s);
              if (idx !== -1) activeSlides.splice(idx, 1);
            } else if (Math.abs(s.progress - 1.0) < 0.35) {
              combo++; if (combo > maxCombo) maxCombo = combo;
              showJudge('PERFECT SLIDE!', '#00e5ff', s.endLane); updateUI(true);
              s.container.remove(); s.starEl.remove();
              const idx = activeSlides.indexOf(s);
              if (idx !== -1) activeSlides.splice(idx, 1);
            }
          }
        }
      });
    }

    function onButtonDown(lane) {
      if (!isPlaying) return;

      let targetIndex = -1, minDiff = 999, bestDiffSigned = 0;
      notes.forEach((n, index) => {
        if (n.lane === lane) {
          const prog = (n.type === 'HOLD') ? n.headProgress : n.progress;
          const diff = prog - 1.0;
          const absDiff = Math.abs(diff);
          if (absDiff < minDiff && !n.holding) { 
            minDiff = absDiff; 
            bestDiffSigned = diff;
            targetIndex = index; 
          }
        }
      });

      if (targetIndex !== -1 && minDiff < 0.32) {
        const n = notes[targetIndex];

        if (n.type === 'HOLD') {
          n.holding = true; n.headProgress = 1.0; activeHolds[lane] = n;
          showJudge('HOLDING!', '#ff00cc', lane); return;
        }

        if (n.type === 'SLIDE') {
          triggerSlide(n.lane, n.targetLane, n.slideLength);
          showJudge('STAR HIT!', '#00e5ff', lane);
          n.el.remove(); notes.splice(targetIndex, 1); return;
        }

        let judgeType = 'PERFECT';
        let judgeColor = '#ffea00';
        let penalty = 0;

        const timingTag = bestDiffSigned < -0.04 ? ' [FAST]' : (bestDiffSigned > 0.04 ? ' [LATE]' : '');

        if (minDiff <= 0.05) {
          judgeType = 'CRITICAL PERFECT';
          judgeColor = '#ff00ff';
          penalty = 0;
        } else if (minDiff <= 0.12) {
          judgeType = 'PERFECT';
          judgeColor = '#ffea00';
          penalty = 0;
        } else if (minDiff <= 0.22) {
          judgeType = 'GREAT';
          judgeColor = '#00e676';
          penalty = penaltyPerNote * 0.4;
        } else {
          judgeType = 'GOOD';
          judgeColor = '#29b6f6';
          penalty = penaltyPerNote * 0.8;
        }

        if (n.type === 'EACH') {
          judgeType = 'EACH ' + judgeType;
        } else if (n.type === 'BREAK') {
          if (minDiff <= 0.05) {
            judgeType = 'CRITICAL BREAK!!';
            judgeColor = '#ff3d00';
            penalty = 0;
          } else if (minDiff <= 0.12) {
            judgeType = 'PERFECT BREAK!';
            judgeColor = '#ff9100';
            penalty = 0;
          } else if (minDiff <= 0.22) {
            judgeType = 'GREAT BREAK';
            judgeColor = '#00e676';
            penalty = penaltyPerNote * 0.3;
          } else {
            judgeType = 'GOOD BREAK';
            judgeColor = '#29b6f6';
            penalty = penaltyPerNote * 0.6;
          }
        }

        judgeType += timingTag;

        if (penalty > 0) {
          score = Math.max(0, score - penalty);
        }
        combo++; 
        if (combo > maxCombo) maxCombo = combo;
        showJudge(judgeType, judgeColor, lane); 
        updateUI(true);
        n.el.remove(); 
        notes.splice(targetIndex, 1);
      }
    }

    function onButtonUp(lane) {
      if (!isPlaying) return;

      if (activeHolds[lane]) {
        const hNote = activeHolds[lane];
        score = Math.max(0, score - penaltyPerNote);
        showJudge('FAST RELEASE', '#ff4d4d', lane);
        combo = 0;
        updateUI();
        hNote.el.remove();
        const idx = notes.indexOf(hNote);
        if (idx !== -1) notes.splice(idx, 1);
        delete activeHolds[lane];
      }
    }

    function showJudge(text, color, lane) {
      const angleRad = BUTTON_ANGLES[lane] * (Math.PI / 180);
      const x = CENTER_X + RADIUS * 0.8 * Math.cos(angleRad), y = CENTER_Y + RADIUS * 0.8 * Math.sin(angleRad);

      const el = document.createElement('div');
      el.className = 'judge-text'; el.innerText = text; el.style.color = color;
      el.style.left = `${x - 45}px`; el.style.top = `${y - 12}px`;
      document.getElementById('game-container').appendChild(el);
      setTimeout(() => el.remove(), 350);
    }

    function updateUI(hit = false) {
      const scoreEl = document.getElementById('score');
      scoreEl.innerText = score.toFixed(2) + '%';
      if (hit) { scoreEl.classList.add('bump'); setTimeout(() => scoreEl.classList.remove('bump'), 50); }
    }
  </script>
